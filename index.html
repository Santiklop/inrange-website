<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="inRange Solutions — independent transfer pricing specialists. Amsterdam-based, working internationally.">
  <title>inRange — Transfer pricing, done right</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: var(--fg-1); }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand-green-500); box-shadow: var(--shadow-focus); }
    button { font-family: inherit; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components/Brand.jsx?v=3"></script>
  <script type="text/babel" src="components/SignalMap.jsx?v=3"></script>
  <script type="text/babel" src="variations/V2_Modern.jsx?v=3"></script>
  <script type="text/babel">
    const { useEffect } = React;
    function App() {
      useEffect(() => {
        const id = setTimeout(() => {
          if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
        }, 50);
        return () => clearTimeout(id);
      });
      return <div data-screen-label="Home"><V2_Modern /></div>;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
